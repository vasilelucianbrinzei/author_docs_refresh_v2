<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Oracle LiveLabs Author Guide path-first experience.">
    <title>Oracle LiveLabs Author Guide</title>
    <script>
        (function () {
            var url = new URL(window.location.href);
            var lab = url.searchParams.get("lab");
            var target;

            if (!lab) {
                return;
            }

            if (lab === "core-workshop-flow") {
                url.searchParams.set("lab", "core-workflow");
            }

            target = new URL("./workshops/livelabs/index.html", url);
            target.search = url.search;
            target.hash = url.hash;
            window.location.replace(target.toString());
        }());
    </script>
    <link rel="stylesheet" href="./author-guide-app.css">
    <link rel="shortcut icon" href="https://oracle-livelabs.github.io/common/redwood-hol/img/favicon.ico">
    <script defer src="./author-guide-app.js"></script>
</head>

<body class="author-guide-page">
    <noscript>
        <main class="no-script-shell">
            <h1>Oracle LiveLabs Author Guide</h1>
            <p>Choose the path that matches how you work.</p>
            <ul>
                <li><a href="./workshops/core-workshop-flow/index.html?lab=core-workflow">Guided Path</a></li>
                <li><a href="./workshops/livelabs/index.html?lab=core-workflow">Reference Toolkit</a></li>
            </ul>
        </main>
    </noscript>
    <div id="authorGuideApp"></div>
</body>

</html>
